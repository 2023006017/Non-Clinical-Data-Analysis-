name: Render Quarto Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            tidyverse
            nlmixr2
            ggplot2
            patchwork
            vpc
            knitr
            kableExtra
            MASS

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render report
        run: quarto render report/CNS_PopPK_Report.qmd --to html

      - name: Upload rendered report
        uses: actions/upload-artifact@v4
        with:
          name: CNS_PopPK_Report
          path: report/CNS_PopPK_Report.html
